version: "3.8"

services:
  mariadb:
    container_name: mariadb-innomcp
    image: mariadb:11.8.2-noble
    volumes:
      - innomcp-db_volume:/var/lib/mysql
    environment:
      - MARIADB_ROOT_PASSWORD=rockbottom
      - MARIADB_USER=jlapps
      - MARIADB_PASSWORD=rockbottom
      - MARIADB_DATABASE=innomcp-db
    networks:
      - webd_network
    restart: always
    command:
      - --performance_schema=OFF
      - --table_open_cache=1024
      - --key_buffer_size=256M
      - --thread_cache_size=64
      - --innodb_buffer_pool_size=2G
      - --innodb_log_buffer_size=256M
      - --max_connections=300
      - --sort_buffer_size=1M
      - --read_buffer_size=1M
      - --read_rnd_buffer_size=1M
      - --join_buffer_size=1M
      - --bind-address=0.0.0.0
      - --port=3308
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --innodb_flush_log_at_trx_commit=2
      - --query_cache_type=0
      - --log-bin=mysql-bin
      - --binlog-format=ROW
      - --server-id=1
      - --binlog-do-db=innomcp-db

volumes:
  innomcp-db_volume:
    name: innomcp-db_volume

networks:
  webd_network:
    name: webd_network
    driver: bridge
