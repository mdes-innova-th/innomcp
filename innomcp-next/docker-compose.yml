version: "3.8"

services:
  webddsb-next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: webddsb-next
    restart: unless-stopped
    expose:
      - "3004"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://webddsb-next:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - webd_network
    volumes:
      - ./assets/images:/app/assets/images
      - webddsb-uploads_volume:/app/assets/uploads
    
networks:
  webd_network:
    name: webd_network
    external: true

volumes:
  webddsb-uploads_volume:
    name: webddsb-uploads_volume
