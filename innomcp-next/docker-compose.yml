version: "3.8"

services:
  innomcp-next:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: innomcp-next
    restart: unless-stopped
    expose:
      - "3004"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://innomcp-next:3004/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - innomcp_network
    volumes:
      - ./assets/images:/app/assets/images
      - innomcp-uploads_volume:/app/assets/uploads
    
networks:
  innomcp_network:
    name: innomcp_network
    external: true

volumes:
  innomcp-uploads_volume:
    name: innomcp-uploads_volume
