name: CI Minimum Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  build-backend:
    name: build-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build backend
        run: npm run build

  build-mcp:
    name: build-mcp
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-server-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-server-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build MCP server
        run: npm run build

  build-frontend:
    name: build-frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-next
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-next/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build frontend
        run: npm run build

  test-thai-geo-tool:
    name: test-thai-geo-tool
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-server-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-server-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run thai geo tool tests
        run: npm run test:thaiGeoTool

  test-thai-knowledge-tool:
    name: test-thai-knowledge-tool
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-server-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-server-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run thai knowledge tool tests
        run: npm run test:thaiKnowledgeTool

  test-backend-integration:
    name: test-backend-integration
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run backend integration tests
        run: npm run test:integration

  test-backend:
    name: test-backend
    needs: build-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-node
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: innomcp_test
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-node/package-lock.json
      - run: npm ci
      - name: Run unit tests
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: innomcp_test
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
        run: npm test -- --passWithNoTests --ci

  test-backend-unit:
    name: test-backend-unit (Jest)
    needs: build-backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: innomcp-node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-node/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests (no DB required)
        run: npx jest --testPathIgnorePatterns="integration|e2e" --passWithNoTests --no-coverage
        env:
          INNOMCP_MODE: offline
          SMOKE_MODE: "1"

  test-playwright:
    name: test-playwright
    needs: build-backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: innomcp-node
    services:
      mariadb:
        image: mariadb:10.11
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: innomcp_test
        ports:
          - 3306:3306
        options: --health-cmd="mariadb-admin ping" --health-interval=5s --health-timeout=3s --health-retries=10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: innomcp-node/package-lock.json
      - run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
      - name: Start backend in background
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_USER: root
          DB_PASSWORD: testpass
          DB_NAME: innomcp_test
          JWT_SECRET: test-secret-for-ci
          NODE_ENV: test
          PORT: 3011
        run: npm run dev &
      - name: Wait for backend to be ready
        run: npx wait-on http://localhost:3011/api/health --timeout 30000
      - name: Run Playwright E2E (agent-leaderboard)
        continue-on-error: true
        run: npx playwright test --project=chromium tests/e2e/agent-leaderboard.spec.ts
